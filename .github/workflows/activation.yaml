name: Auto-Activate License
on: workflow_dispatch
jobs:
  activation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Request ALF
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2

      - name: Fetch License Text
        id: fetchLicense
        uses: game-ci/unity-license-activate@v2
        with:
          username: ${{ secrets.UNITY_EMAIL }}
          password: ${{ secrets.UNITY_PASSWORD }}
          alfFile: ${{ steps.getManualLicenseFile.outputs.filePath }}

      - name: Display License (Copy This)
        run: |
          echo "COPY THE TEXT BELOW THIS LINE:"
          echo "${{ steps.fetchLicense.outputs.license }}"
