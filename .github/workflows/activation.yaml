name: Force Get ALF
on: workflow_dispatch
jobs:
  activation:
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-2022.3.12f1-base-3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate ALF
        run: |
          /opt/unity/Editor/Unity -batchmode -nographics -createManualActivationFile -logfile /dev/stdout || true
          mv *.alf activation.alf
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: activation-file
          path: activation.alf
