name: Get ALF File
on: workflow_dispatch
jobs:
  get-alf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate ALF
        uses: game-ci/unity-request-activation-file@main
        with:
          unityVersion: 2022.3.12f1

      - name: Upload ALF
        uses: actions/upload-artifact@v4
        with:
          name: manual-activation-file
          path: ./*.alf
